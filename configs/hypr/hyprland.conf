# Default Hyprland config for this host
$mod = SUPER
$terminal = ghostty
$menu = sh -lc 'pgrep -x wofi >/dev/null && pkill -x wofi || wofi --show drun'

monitor=,3840x2160@144,auto,1
exec-once = waybar
exec-once = sh -lc 'wallpaper-runner --video "$HOME/.config/wallpapers/wallpaper.mp4" --monitor auto'
exec-once = [workspace 1 silent] firefox
exec-once = [workspace 4 silent] Telegram
exec-once = [workspace 5 silent] ghostty
exec-once = [workspace name:S silent] steam

input {
  kb_layout = us,ru
  kb_options = grp:alt_shift_toggle
  repeat_rate = 50
  repeat_delay = 200
  accel_profile = flat
  follow_mouse = 1
  touchpad {
    natural_scroll = no
  }
  sensitivity = 1
}

general {
  gaps_in = 5
  gaps_out = 12
  border_size = 2
  col.active_border = rgba(58a6ffff) rgba(7ee787ff) 45deg
  col.inactive_border = rgba(2b3340cc)
  layout = dwindle
  allow_tearing = false
}

decoration {
  rounding = 6
  blur {
    enabled = false
  }
}

animations {
  enabled = true
}

dwindle {
  pseudotile = true
  preserve_split = true
}

master {
  new_status = master
}

misc {
  disable_hyprland_logo = true
}

windowrule {
  name = steam-to-workspace-S
  match:class = ^(steam|Steam|steamwebhelper)$
  workspace = name:S silent
}

windowrule {
  name = steam-initial-to-workspace-S
  match:initial_class = ^(steam|Steam|steamwebhelper)$
  workspace = name:S silent
}

bind = $mod, Return, exec, $terminal
bind = $mod, R, exec, $menu
bind = $mod, Q, killactive
bind = $mod, L, exec, hyprlock
bind = $mod, K, fullscreen, 1
bind = $mod SHIFT, L, togglefloating
bind = $mod, P, pseudo
bind = $mod, J, togglesplit
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Extra workspace binds on letters (named workspaces)
bind = $mod, A, workspace, name:A
bind = $mod, S, workspace, name:S
bind = $mod, D, workspace, name:D
bind = $mod, E, workspace, name:E
bind = $mod, F, workspace, name:F
bind = $mod, G, workspace, name:G
bind = $mod, T, workspace, name:T
bind = $mod, Z, workspace, name:Z
bind = $mod, X, workspace, name:X
bind = $mod, C, workspace, name:C
bind = $mod, V, workspace, name:V
bind = $mod, B, workspace, name:B
bind = $mod, N, workspace, name:N
bind = $mod, M, workspace, name:M

bind = $mod SHIFT, A, movetoworkspace, name:A
bind = $mod SHIFT, S, movetoworkspace, name:S
bind = $mod SHIFT, D, movetoworkspace, name:D
bind = $mod SHIFT, E, movetoworkspace, name:E
bind = $mod SHIFT, F, movetoworkspace, name:F
bind = $mod SHIFT, G, movetoworkspace, name:G
bind = $mod SHIFT, T, movetoworkspace, name:T
bind = $mod SHIFT, Z, movetoworkspace, name:Z
bind = $mod SHIFT, X, movetoworkspace, name:X
bind = $mod SHIFT, C, movetoworkspace, name:C
bind = $mod SHIFT, V, movetoworkspace, name:V
bind = $mod SHIFT, B, movetoworkspace, name:B
bind = $mod SHIFT, N, movetoworkspace, name:N
bind = $mod SHIFT, M, movetoworkspace, name:M
